name: Build and Deploy UI to GitHub Pages

on:
  push:
    branches:
      - 'main'
      - 'master'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  UI_DIR: ui

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ env.UI_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.UI_DIR }}

      - name: Inject API host
        run: |
          sed -i "s|VITE_API_HOST_PLACEHOLDER|${{ vars.API_HOST }}|g" \
            src/environments/environment.prod.ts
        working-directory: ${{ env.UI_DIR }}

      - name: Build
        run: npm run build -- --configuration=production --base-href=/${{ github.event.repository.name }}/
        working-directory: ${{ env.UI_DIR }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.UI_DIR }}/dist/${{ env.UI_DIR }}/browser

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4