name: CI Build master

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_ARGS: "--no-daemon --console=plain --stacktrace"

jobs:
  build:
    name: "Gradle build on JDK 21"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'corretto'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Print gradlew version
        run: ./gradlew -v

      - name: Build only service with Gradle.
        run: ./gradlew :chess-ai-battle:build -x test $GRADLE_ARGS

